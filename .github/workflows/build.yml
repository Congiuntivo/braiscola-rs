name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release-artifact-name: ${{ steps.release_meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo and build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Build release binaries
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo build --release -p cli --bins --locked

      - name: Package release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARTIFACT_NAME="braiscola-linux-x86_64-${TAG}"
          mkdir -p dist
          cp target/release/cli dist/
          cp target/release/advisor dist/
          cp target/release/play_tui dist/
          cp target/release/simulate_game dist/
          tar -C dist -czf "${ARTIFACT_NAME}.tar.gz" cli advisor play_tui simulate_game
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.artifact_name }}
          path: ${{ steps.release_meta.outputs.artifact_name }}.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.release-artifact-name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
