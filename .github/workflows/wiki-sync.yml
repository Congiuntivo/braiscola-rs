name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - plan/**/*.md
      - examples/**/*.md
      - scripts/**/*.md
      - res/**/*.md
      - scripts/export_wiki.sh
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export wiki pages from repository docs
        run: |
          bash scripts/export_wiki.sh "$RUNNER_TEMP/wiki-src"

      - name: Clone repository wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" "$RUNNER_TEMP/wiki"

      - name: Sync pages
        run: |
          rsync -av --delete "$RUNNER_TEMP/wiki-src/" "$RUNNER_TEMP/wiki/"

      - name: Commit and push wiki changes
        run: |
          cd "$RUNNER_TEMP/wiki"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No wiki changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs(wiki): sync pages from repository"
          git push origin HEAD
