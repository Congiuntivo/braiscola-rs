name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - Cargo.toml
      - briscola_core/**/*.rs
      - briscola_ai/**/*.rs
      - cli/**/*.rs
      - plan/**/*.md
      - examples/**/*.md
      - scripts/**/*.md
      - res/**/*.md
      - scripts/export_wiki.sh
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show sync target
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Wiki URL: https://github.com/${{ github.repository }}.wiki.git"

      - name: Install nightly toolchain for api markdown generation
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-doc-md
        run: |
          cargo +nightly install cargo-doc-md --locked

      - name: Generate Rust API markdown
        run: |
          cargo +nightly doc-md --workspace -o "$RUNNER_TEMP/doc-md"
          echo "Generated API markdown structure:"
          find "$RUNNER_TEMP/doc-md" -maxdepth 3 -type f | sort

      - name: Export wiki pages from repository docs
        run: |
          bash scripts/export_wiki.sh "$RUNNER_TEMP/wiki-src" "$RUNNER_TEMP/doc-md"
          echo "Exported pages:"
          ls -la "$RUNNER_TEMP/wiki-src"
          for required in Home.md Game-as-Algorithm.md Advisor-Examples.md Scripts.md Card-Assets.md Rust-API.md _Sidebar.md; do
            if [[ ! -f "$RUNNER_TEMP/wiki-src/$required" ]]; then
              echo "Missing exported wiki page: $required" >&2
              exit 1
            fi
          done

      - name: Clone repository wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" "$RUNNER_TEMP/wiki"
          echo "Current wiki repo files before sync:"
          ls -la "$RUNNER_TEMP/wiki"

      - name: Sync pages
        run: |
          rsync -av --delete --exclude='.git' "$RUNNER_TEMP/wiki-src/" "$RUNNER_TEMP/wiki/"
          echo "Wiki repo files after sync:"
          ls -la "$RUNNER_TEMP/wiki"

      - name: Commit and push wiki changes
        run: |
          cd "$RUNNER_TEMP/wiki"
          git status --porcelain
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No wiki changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs(wiki): sync pages from repository"
          git push origin HEAD
